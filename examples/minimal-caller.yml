---
# Minimal caller workflow
# Packages an MCPB bundle on every push to main
# and on tag pushes.
name: Package MCPB Bundle

"on":
  push:
    branches: [main]
    tags: ['v*']

jobs:
  package:
    uses: >-
      zircote/mcp-bundle/.github/workflows/mcp-bundle.yml@v1
    with:
      source-files: "src/**"
