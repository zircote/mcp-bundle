# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# yamllint disable rule:line-length
---
name: MCP Bundle

on:  # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      source-files:
        description: Glob pattern(s) for MCP server source files to include in the bundle
        required: false
        type: string
        default: src/**
      manifest-path:
        description: Path to the bundle manifest.json
        required: false
        type: string
        default: manifest.json
      config-files:
        description: Glob pattern(s) for configuration files to include (e.g., config/*.json)
        required: false
        type: string
        default: ''
      additional-artifacts:
        description: Glob pattern(s) for extra files to bundle (assets, schemas, templates, etc.)
        required: false
        type: string
        default: ''
      node-version:
        description: Node.js version for build environment
        required: false
        type: string
        default: '18'
      build-command:
        description: Custom build command to run before packaging
        required: false
        type: string
        default: npm run build
      test-command:
        description: Custom test command to run before packaging; set to empty string to skip
        required: false
        type: string
        default: npm test
      bundle-name:
        description: Override bundle output filename (defaults to name from manifest.json)
        required: false
        type: string
        default: ''
      upload-artifact:
        description: Whether to upload the bundle as a GitHub Actions artifact
        required: false
        type: boolean
        default: true
      create-release-asset:
        description: Whether to attach the bundle to a GitHub Release (only on tag pushes)
        required: false
        type: boolean
        default: false
      mcpb-version:
        description: Version of mcpb toolchain to use
        required: false
        type: string
        default: latest
      runs-on:
        description: >-
          Runner label for the packaging job
        required: false
        type: string
        default: ubuntu-latest
    outputs:
      bundle-path:
        description: Path to the generated bundle file
        value: ${{ jobs.package.outputs.bundle-path }}
      bundle-sha256:
        description: SHA-256 checksum of the bundle for integrity verification
        value: ${{ jobs.package.outputs.bundle-sha256 }}
      manifest-valid:
        description: Whether manifest validation passed (true/false)
        value: ${{ jobs.package.outputs.manifest-valid }}

jobs:
  package:
    name: Package MCPB Bundle
    runs-on: ${{ inputs.runs-on }}
    outputs:
      bundle-path: ${{ steps.pack.outputs.bundle-path }}
      bundle-sha256: ${{ steps.checksum.outputs.sha256 }}
      manifest-valid: ${{ steps.validate.outputs.valid }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mcp-bundle action scripts
        # mirrors scripts/validate-manifest.sh from main via sparse checkout;
        # callers get updated validation automatically. For frozen/pinned
        # validation, use the composite action instead.
        uses: actions/checkout@v4
        with:
          repository: zircote/mcp-bundle
          ref: main
          path: .mcp-bundle-action
          sparse-checkout: scripts/validate-manifest.sh
          sparse-checkout-cone-mode: false

      - name: Detect server type
        id: detect
        env:
          MANIFEST: ${{ inputs.manifest-path }}
        run: |
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Manifest not found: $MANIFEST"
            exit 1
          fi
          SERVER_TYPE=$(jq -r '.server.type' "$MANIFEST")
          echo "server-type=$SERVER_TYPE" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.detect.outputs.server-type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.server-type == 'node'
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Install Python dependencies
        if: steps.detect.outputs.server-type == 'python'
        run: |
          if [ -f "requirements.txt" ]; then
            pip install --quiet -r requirements.txt
          fi

      - name: Run build command
        if: inputs.build-command != ''
        env:
          BUILD_CMD: ${{ inputs.build-command }}
        run: bash -c "$BUILD_CMD"

      - name: Run test command
        if: inputs.test-command != ''
        env:
          TEST_CMD: ${{ inputs.test-command }}
        run: bash -c "$TEST_CMD"

      - name: Validate manifest.json
        id: validate
        env:
          MANIFEST: ${{ inputs.manifest-path }}
        run: |
          # shellcheck source=.mcp-bundle-action/scripts/validate-manifest.sh
          source "$GITHUB_WORKSPACE/.mcp-bundle-action/scripts/validate-manifest.sh"

          ENTRY=$(jq -r '.server.entry_point // empty' "$MANIFEST")
          if [ -n "$ENTRY" ] && [ ! -f "$ENTRY" ]; then
            echo "::warning::Entry point not found: ${ENTRY} (expected if build produces it)"
          fi

          if ! ERRORS=$(validate_manifest "$MANIFEST"); then
            echo "::error::Manifest validation failed:"
            printf "%b" "$ERRORS" | while IFS= read -r line; do
              echo "::error::  $line"
            done
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Manifest validation passed"
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Install mcpb CLI
        if: steps.detect.outputs.server-type == 'node'
        env:
          MCPB_VER: ${{ inputs.mcpb-version }}
        run: |
          if [ "$MCPB_VER" = "latest" ]; then
            npm install -g @anthropic-ai/mcpb
          else
            npm install -g "@anthropic-ai/mcpb@${MCPB_VER}"
          fi

      - name: Collect bundle files
        id: collect
        env:
          SOURCE_FILES: ${{ inputs.source-files }}
          CONFIG_FILES: ${{ inputs.config-files }}
          EXTRA_FILES: ${{ inputs.additional-artifacts }}
          MANIFEST: ${{ inputs.manifest-path }}
          SERVER_TYPE: ${{ steps.detect.outputs.server-type }}
        run: |
          shopt -s globstar
          STAGING=$(mktemp -d)
          echo "staging-dir=$STAGING" >> "$GITHUB_OUTPUT"

          cp "$MANIFEST" "$STAGING/manifest.json"

          # copy_glob <pattern> <dest> — prints match count to stdout.
          copy_glob() {
            local pattern="$1" dest="$2" matched=0
            for f in $pattern; do
              [ -f "$f" ] || continue
              local rel="${f#./}"
              mkdir -p "$dest/$(dirname "$rel")"
              cp "$f" "$dest/$rel"
              matched=$((matched + 1))
            done
            if [ "$matched" -eq 0 ]; then
              echo "::warning::No files matched glob: ${pattern}" \
                "(cwd: $(pwd) — verify source-files/config-files input)" >&2
            fi
            echo "$matched"
          }

          TOTAL_SRC=0
          IFS=',' read -ra SRCS <<< "$SOURCE_FILES"
          for pat in "${SRCS[@]}"; do
            pat=$(echo "$pat" | xargs)
            [ -z "$pat" ] && continue
            count=$(copy_glob "$pat" "$STAGING")
            TOTAL_SRC=$((TOTAL_SRC + count))
          done
          if [ "$TOTAL_SRC" -eq 0 ]; then
            echo "::error::No source files matched any SOURCE_FILES pattern(s): ${SOURCE_FILES}"
            exit 1
          fi

          if [ -n "$CONFIG_FILES" ]; then
            IFS=',' read -ra CFGS <<< "$CONFIG_FILES"
            for pat in "${CFGS[@]}"; do
              pat=$(echo "$pat" | xargs)
              [ -z "$pat" ] && continue
              copy_glob "$pat" "$STAGING" > /dev/null
            done
          fi

          if [ -n "$EXTRA_FILES" ]; then
            IFS=',' read -ra EXTRAS <<< "$EXTRA_FILES"
            for pat in "${EXTRAS[@]}"; do
              pat=$(echo "$pat" | xargs)
              [ -z "$pat" ] && continue
              copy_glob "$pat" "$STAGING" > /dev/null
            done
          fi

          if [ -f "package.json" ] && [ "$SERVER_TYPE" = "node" ]; then
            cp package.json "$STAGING/"
          fi
          if [ -d "node_modules" ] && [ "$SERVER_TYPE" = "node" ]; then
            NM_MB=$(du -sm node_modules 2>/dev/null | cut -f1 || echo 0)
            if [ "${NM_MB:-0}" -gt 50 ]; then
              echo "::warning::node_modules is ${NM_MB}MB — consider running npm ci --omit=dev or using .mcpbignore to exclude dev dependencies before bundling"
            fi
            cp -r node_modules "$STAGING/"
          fi

          if [ -f "requirements.txt" ] && [ "$SERVER_TYPE" = "python" ]; then
            cp requirements.txt "$STAGING/"
          fi

          if [ -f "pyproject.toml" ] && [ "$SERVER_TYPE" = "uv" ]; then
            cp pyproject.toml "$STAGING/"
          fi

          if [ -f "LICENSE" ]; then
            cp LICENSE "$STAGING/"
          fi

          if [ -f ".mcpbignore" ]; then
            cp ".mcpbignore" "$STAGING/"
          fi

          ICON=$(jq -r '.icon // empty' "$MANIFEST")
          if [ -n "$ICON" ] && [ -f "$ICON" ]; then
            cp "$ICON" "$STAGING/"
          fi

          echo "Files staged for bundling:"
          find "$STAGING" -type f | head -50

      - name: Apply .mcpbignore exclusions
        if: hashFiles('.mcpbignore') != ''
        env:
          STAGING: ${{ steps.collect.outputs.staging-dir }}
        run: |
          if [ ! -f ".mcpbignore" ]; then exit 0; fi
          while IFS= read -r pattern || [ -n "$pattern" ]; do
            pattern=$(echo "$pattern" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$pattern" ] && continue
            [[ "$pattern" == \#* ]] && continue
            if [[ "$pattern" == \!* ]]; then
              echo "::warning::.mcpbignore negation pattern not supported (skipped): ${pattern}"
              continue
            fi
            if [[ "$pattern" == */ ]]; then
              dirpat="${pattern%/}"
              if [[ "$dirpat" == */* ]]; then
                find "$STAGING" -type d -path "*/${dirpat}" \
                  -exec rm -rf {} + 2>/dev/null || true
              else
                find "$STAGING" -type d -name "${dirpat}" \
                  -exec rm -rf {} + 2>/dev/null || true
              fi
            elif [[ "$pattern" == */* ]]; then
              find "$STAGING" -path "*/${pattern}" \
                -exec rm -rf {} + 2>/dev/null || true
            else
              find "$STAGING" -name "$pattern" \
                -exec rm -rf {} + 2>/dev/null || true
            fi
          done < ".mcpbignore"
          echo "Files after .mcpbignore filtering:"
          find "$STAGING" -type f | head -50

      - name: Package bundle
        id: pack
        env:
          STAGING: ${{ steps.collect.outputs.staging-dir }}
          BUNDLE_NAME_INPUT: ${{ inputs.bundle-name }}
          MANIFEST: ${{ inputs.manifest-path }}
        run: |
          if [ -n "$BUNDLE_NAME_INPUT" ]; then
            BNAME="$BUNDLE_NAME_INPUT"
          else
            BNAME=$(jq -r '.name' "$MANIFEST")
          fi
          # Strip path separators and leading dots to prevent path traversal
          BNAME=$(echo "$BNAME" | tr -d '/' | sed 's/^\.\+//')

          VERSION=$(jq -r '.version' "$MANIFEST")
          VERSION=$(echo "$VERSION" | tr -cd 'a-zA-Z0-9._+-')

          BUNDLE_FILE="${BNAME}-${VERSION}.mcpb"

          cd "$STAGING"
          if command -v mcpb &>/dev/null; then
            mcpb pack --output "$GITHUB_WORKSPACE/$BUNDLE_FILE" || \
              zip -ry "$GITHUB_WORKSPACE/$BUNDLE_FILE" . -x '*.git*'
          else
            zip -ry "$GITHUB_WORKSPACE/$BUNDLE_FILE" . -x '*.git*'
          fi

          cd "$GITHUB_WORKSPACE"

          # Validate bundle structure
          BUNDLE_CONTENTS=$(unzip -Z1 "$BUNDLE_FILE" 2>/dev/null || true)
          if ! echo "$BUNDLE_CONTENTS" | grep -q '^manifest\.json$'; then
            echo "::error::Bundle missing manifest.json — archive may be malformed"
            exit 1
          fi
          ENTRY_POINT=$(jq -r '.server.entry_point // empty' "$MANIFEST")
          if [ -n "$ENTRY_POINT" ]; then
            ENTRY_REL="${ENTRY_POINT#./}"
            if ! echo "$BUNDLE_CONTENTS" | grep -qF "$ENTRY_REL"; then
              echo "::warning::Bundle does not contain declared entry_point: ${ENTRY_REL}"
            fi
          fi

          echo "bundle-path=$BUNDLE_FILE" >> "$GITHUB_OUTPUT"
          echo "Bundle created: $BUNDLE_FILE ($(du -h "$BUNDLE_FILE" | cut -f1))"

      - name: Generate SHA-256 checksum
        id: checksum
        env:
          BUNDLE_FILE: ${{ steps.pack.outputs.bundle-path }}
        run: |
          if command -v sha256sum &>/dev/null; then
            SHA256=$(sha256sum "$BUNDLE_FILE" | awk '{print $1}')
          else
            SHA256=$(shasum -a 256 "$BUNDLE_FILE" | awk '{print $1}')
          fi
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "$SHA256  $BUNDLE_FILE" > "${BUNDLE_FILE}.sha256"
          echo "SHA-256: $SHA256"

      - name: Upload bundle artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpb-bundle
          path: |
            ${{ steps.pack.outputs.bundle-path }}
            ${{ steps.pack.outputs.bundle-path }}.sha256

      - name: Attach to GitHub Release
        if: inputs.create-release-asset && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          BUNDLE_FILE: ${{ steps.pack.outputs.bundle-path }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" "$BUNDLE_FILE" "${BUNDLE_FILE}.sha256" --clobber
          echo "Attached $BUNDLE_FILE to release $TAG"

      - name: Cleanup staging directory
        if: always()
        env:
          STAGING: ${{ steps.collect.outputs.staging-dir }}
        run: '[ -n "$STAGING" ] && rm -rf "$STAGING"'
